spring:
  application:
    name: octane
  jackson:
    serialization:
      write-dates-as-timestamps: false

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/octane_db}
    username: ${DB_USER:octane}
    password: ${DB_PASS:octane}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
